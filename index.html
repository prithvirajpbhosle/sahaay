<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1F6F5C">
<title>Sahaay — Know what you're owed</title>
<style>
  :root{
    --accent:#1F6F5C; --accent-dark:#155244; --accent-light:#E7F2EE;
    --bg:#F7F8F7; --card:#FFFFFF; --ink:#1A1A1A; --muted:#5A6360;
    --line:#E2E6E4; --warn:#B5651D; --ok:#1F6F5C; --gold:#C8922B;
    --shadow:0 2px 10px rgba(0,0,0,.06);
  }
  head,title,style,script{display:none!important}
  div,header,nav,footer,section,h1,h2,h3,p,ul{display:block}
  li{display:list-item}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;font-size:16px;-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:78px}
  /* Top bar */
  .topbar{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:19px;letter-spacing:.3px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:#9FE0CC;display:inline-block}
  .lang{display:flex;gap:4px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px}
  .lang button{border:0;background:transparent;color:#EAF6F1;font-size:13px;font-weight:600;
    padding:5px 9px;border-radius:16px;cursor:pointer;font-family:inherit}
  .lang button.on{background:#fff;color:var(--accent)}
  /* Screen container */
  .screen{padding:18px 16px 24px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h1{font-size:23px;margin:6px 0 8px;font-weight:800;line-height:1.25}
  h2{font-size:18px;margin:2px 0 6px;font-weight:700}
  p.sub{color:var(--muted);margin:0 0 18px;font-size:15px}
  /* Hero */
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;
    border-radius:18px;padding:22px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
  .hero h1{color:#fff;font-size:24px}
  .hero p{color:#D7EDE6;margin:8px 0 0;font-size:15px}
  .stat{display:flex;gap:10px;margin-top:16px}
  .stat div{flex:1;background:rgba(255,255,255,.12);border-radius:12px;padding:10px}
  .stat b{display:block;font-size:20px}
  .stat span{font-size:11.5px;color:#CFE8DF;line-height:1.3;display:block;margin-top:2px}
  /* Buttons */
  .btn{display:block;width:100%;border:0;background:var(--accent);color:#fff;font-weight:700;
    font-size:17px;padding:16px;border-radius:14px;cursor:pointer;font-family:inherit;box-shadow:var(--shadow);
    transition:transform .08s}
  .btn:active{transform:scale(.98)}
  .btn.secondary{background:#fff;color:var(--accent);border:1.5px solid var(--accent);box-shadow:none}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-weight:600;font-size:15px;padding:10px}
  /* Question cards */
  .qwrap{margin-top:6px}
  .progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px}
  .progress i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
  .qstep{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .opt{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;padding:15px 16px;margin-bottom:11px;cursor:pointer;font-size:16px;font-weight:600;
    transition:.12s}
  .opt:active{transform:scale(.99)}
  .opt.sel{border-color:var(--accent);background:var(--accent-light)}
  .opt .em{font-size:22px;width:26px;text-align:center}
  .opt.multi .chk{margin-left:auto;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none}
  .opt.multi.sel .chk{background:var(--accent);border-color:var(--accent);position:relative}
  .opt.multi.sel .chk:after{content:"✓";color:#fff;font-size:14px;position:absolute;top:-1px;left:3px}
  /* Result cards */
  .resulthead{background:var(--accent-light);border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .resulthead b{color:var(--accent-dark)}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;border:1px solid var(--line)}
  .card .ch{padding:16px;display:flex;gap:13px;align-items:flex-start;cursor:pointer}
  .card .ic{width:42px;height:42px;border-radius:11px;background:var(--accent-light);display:flex;align-items:center;
    justify-content:center;font-size:22px;flex:none}
  .card .ti{flex:1}
  .card .ti h2{font-size:16.5px;margin:0}
  .card .ti .tag{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-light);
    display:inline-block;padding:2px 8px;border-radius:10px;margin-top:5px}
  .card .ti .tag.money{color:#8a6300;background:#FBF1D9}
  .card .ti p{margin:6px 0 0;font-size:14px;color:var(--muted)}
  .card .arrow{align-self:center;color:var(--muted);transition:transform .2s;font-size:18px}
  .card.open .arrow{transform:rotate(90deg)}
  .card .body{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 16px}
  .card.open .body{max-height:1400px;padding:0 16px 16px}
  .card .body h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 7px}
  .step{display:flex;gap:10px;margin-bottom:9px;font-size:14.5px}
  .step .n{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;
    font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;margin-top:1px}
  .doclist{list-style:none;padding:0;margin:0}
  .doclist li{font-size:14.5px;padding:6px 0 6px 24px;position:relative;border-bottom:1px solid var(--line)}
  .doclist li:last-child{border-bottom:0}
  .doclist li:before{content:"📄";position:absolute;left:0;top:6px;font-size:13px}
  .tip{background:#FBF1D9;border-radius:10px;padding:11px 13px;font-size:13.5px;color:#6b5012;margin-top:12px}
  /* Checklist screen */
  .ckitem{display:flex;gap:13px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
    border-radius:13px;padding:14px;margin-bottom:10px;cursor:pointer}
  .ckitem .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;margin-top:1px;position:relative}
  .ckitem.done .box{background:var(--ok);border-color:var(--ok)}
  .ckitem.done .box:after{content:"✓";color:#fff;position:absolute;top:-2px;left:4px;font-size:15px;font-weight:700}
  .ckitem .lbl b{display:block;font-size:15px}
  .ckitem .lbl span{font-size:13px;color:var(--muted)}
  .ckitem.done .lbl b{text-decoration:line-through;color:var(--muted)}
  .ckprog{text-align:center;font-weight:700;color:var(--accent);margin:0 0 14px}
  /* bottom nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:#fff;border-top:1px solid var(--line);display:flex;z-index:20}
  .nav button{flex:1;border:0;background:none;padding:11px 0 9px;font-family:inherit;cursor:pointer;color:var(--muted);font-size:11px;font-weight:600}
  .nav button .ni{display:block;font-size:21px;margin-bottom:1px;filter:grayscale(1);opacity:.55}
  .nav button.on{color:var(--accent)}
  .nav button.on .ni{filter:none;opacity:1}
  .disclaimer{font-size:12px;color:var(--muted);background:#EEF1F0;border-radius:10px;padding:11px 13px;margin-top:18px;line-height:1.45}
  .hide{display:none!important}
  /* Desktop: present the mobile column as an intentional centered frame */
  @media(min-width:560px){
    body{background:radial-gradient(circle at 50% 0%, #DCE8E3, #C7D6D0)}
    .app{box-shadow:0 0 50px rgba(0,0,0,.13);min-height:100vh}
  }
  .backlink{color:var(--accent);font-weight:600;font-size:14px;background:none;border:0;padding:6px 0;cursor:pointer;font-family:inherit;margin-bottom:6px;display:inline-flex;gap:5px;align-items:center}
  /* Feedback slide */
  .fbcard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .fbq{font-size:16.5px;font-weight:700;margin:0 0 4px;display:flex;gap:9px;align-items:flex-start}
  .fbq .qn{font-size:18px}
  .ynrow{display:flex;gap:10px;margin-top:11px}
  .yn{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:.12s}
  .yn:active{transform:scale(.98)}
  .yn.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark)}
  .spk{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--accent-dark);
    border:0;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
  .spk:active{transform:scale(.97)}
  .spk.mini{padding:5px 10px;font-size:12px;margin:0}
  .spk.speaking{background:var(--accent);color:#fff}
  .fbintro{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  /* Contact form */
  .inp{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;
    font-family:inherit;margin-bottom:11px;background:#fff;color:var(--ink)}
  .inp:focus{outline:0;border-color:var(--accent)}
  .consent{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--muted);cursor:pointer;margin-bottom:13px;line-height:1.4}
  .consent input{width:20px;height:20px;flex:none;margin-top:1px;accent-color:var(--accent)}
  .cmsg{background:var(--accent-light);color:var(--accent-dark);border-radius:12px;padding:13px;font-size:14.5px;font-weight:600;text-align:center}
  .cardlite{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .cardlite h2{margin:0 0 3px}
</style>
</head>
<body>

    <div class="brand"><span class="dot"></span><span id="brandName">Sahaay</span></div>

      <button data-l="mr">मरा</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="screen-home" class="screen"></div>
  <!-- QUESTIONS -->
  <div id="screen-q" class="screen hide"></div>
  <!-- RESULTS -->
  <div id="screen-results" class="screen hide"></div>
  <!-- CHECKLIST -->
  <div id="screen-checklist" class="screen hide"></div>

  <div class="nav" id="nav">
    <button data-go="home" class="on"><span class="ni">🏠</span><span class="nlabel" data-k="navHome">Home</span></button>
    <button data-go="results"><span class="ni">📋</span><span class="nlabel" data-k="navMine">My benefits</span></button>
    <button data-go="checklist"><span class="ni">✅</span><span class="nlabel" data-k="navList">Checklist</span></button>

</div>

/* ============================ STATE ============================ */
let lang = load("sahaay_lang") || "en";
let answers = load("sahaay_answers") || {age:null, where:null, needs:[]};
if(!answers.fb) answers.fb = {read:null, audio:null};
let checklist = load("sahaay_checklist") || {}; // id -> bool done, key format benefitId
let openCards = {};
let stepI = 0;
let view = "home";
let usageSent = false;

function load(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function s(key){return STR[lang][key]}

/* ===================== DATA BACKEND + AUDIO ===================== */
// Sahaay Data — Google Form (owned by Prithviraj). Every use appends a row.
const FORM_ENDPOINT = "https://docs.google.com/forms/d/e/1FAIpQLSfj2C6cwvx8uxxSkgksENNcKt-i9RbuSBP8Pd_CcWcAnUjmkg/formResponse";
const FIELDS = { type:"entry.254617537", details:"entry.204328594", name:"entry.487134039", whatsapp:"entry.448566359" };
const sessionId = 's' + Date.now() + Math.random().toString(36).slice(2,7);

// Device-native text-to-speech (free, no files, works offline once voices load)
let curUtter = null;
function speak(text, btn){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.spk.speaking').forEach(b=>b.classList.remove('speaking'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang==='hi' ? 'hi-IN' : lang==='mr' ? 'mr-IN' : 'en-IN';
  u.rate = 0.95;
  if(btn){ btn.classList.add('speaking');
    u.onend = ()=>btn.classList.remove('speaking');
    u.onerror = ()=>btn.classList.remove('speaking'); }
  curUtter = u;
  window.speechSynthesis.speak(u);
}

// Send a row to the Google Form (auto-collects to Responses / linked Sheet).
function postData(type, extra){
  if(!FORM_ENDPOINT) return;
  extra = extra||{};
  const details = [
    'lang='+lang,
    'age='+(answers.age||''),
    'where='+(answers.where||''),
    'needs='+((answers.needs||[]).join('+')),
    'benefits='+BENEFITS.filter(eligible).map(b=>b.id).join('+'),
    'read='+answers.fb.read,
    'audio='+answers.fb.audio,
    'ts='+new Date().toISOString(),
    'session='+sessionId
  ].join(' | ');
  const fd = new URLSearchParams();
  fd.append(FIELDS.type, type);
  fd.append(FIELDS.details, details);
  fd.append(FIELDS.name, extra.name||'');
  fd.append(FIELDS.whatsapp, extra.whatsapp||'');
  try{
    fetch(FORM_ENDPOINT,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:fd.toString()});
  }catch(e){}
}

/* ============================ RENDER ============================ */
function setLang(l){lang=l;save("sahaay_lang",l);
  document.querySelectorAll("#langSwitch button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));
  document.documentElement.lang=l; render();}

function go(v){view=v; if(v==="q"){stepI=0;} if('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.go===v|| (v==="q"&&b.dataset.go==="home")));
  render(); window.scrollTo(0,0);}

function eligible(b){
  const a=answers.age, w=answers.where, n=answers.needs;
  const r=b.appliesTo;
  if(r.always) return true;
  let ok=false;
  if(r.age && r.age.includes(a)) ok=true;
  if(r.orAge && (r.orAge.includes(a)||r.orAge.includes(w))) ok=true;
  if(r.needs && n.some(x=>r.needs.includes(x))) ok=true;
  return ok;
}

function render(){
  // brand + nav labels
  document.getElementById("brandName").textContent=s("brand");
  document.querySelectorAll(".nlabel").forEach(e=>e.textContent=s(e.dataset.k));
  ["home","q","results","checklist"].forEach(v=>{
    document.getElementById("screen-"+v).classList.toggle("hide", v!==view);
  });
  if(view==="home") renderHome();
  if(view==="q") renderQ();
  if(view==="results") renderResults();
  if(view==="checklist") renderChecklist();
}

function renderHome(){
  const el=document.getElementById("screen-home");
  el.innerHTML=`
    <div class="hero">
      <h1>${s("heroTitle")}</h1>
      <p>${s("heroSub")}</p>
      <div class="stat">
        <div><b>${s("stat1n")}</b><span>${s("stat1t")}</span></div>
        <div><b>${s("stat2n")}</b><span>${s("stat2t")}</span></div>
        <div><b>${s("stat3n")}</b><span>${s("stat3t")}</span></div>
      </div>
    </div>
    <button class="btn" id="startBtn">${s("start")} →</button>
    <div class="disclaimer">${s("disclaimer")}</div>`;
  el.querySelector("#startBtn").onclick=()=>go("q");
}

// Flow: age → where → feedback (thrown in between) → needs → results
const STEPS = ["age","where","feedback","needs"];

function esc(t){return String(t).replace(/"/g,"&quot;");}

function renderQ(){
  const el=document.getElementById("screen-q");
  const total=STEPS.length;
  const kind=STEPS[stepI];
  const pct=Math.round(stepI/total*100);
  const head=`
    ${stepI>0?`<button class="backlink" id="bk">← ${s("back")}</button>`:''}
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="qstep">${stepI+1} / ${total}</div>`;

  if(kind==="feedback"){ renderFeedback(el,head); return; }

  // Question steps (age / where / needs)
  const cfg={
    age:{key:"age", q:s("q1"), opts:STR[lang].q1o, multi:false, intro:s("qIntro")},
    where:{key:"where", q:s("q2"), opts:STR[lang].q2o, multi:false},
    needs:{key:"needs", q:s("q3"), opts:STR[lang].q3o, multi:true},
  }[kind];
  let optsHtml=cfg.opts.map(o=>{
    const val=o[2];
    let sel = cfg.multi ? answers.needs.includes(val) : answers[cfg.key]===val;
    return `<div class="opt ${cfg.multi?'multi':''} ${sel?'sel':''}" data-v="${val}">
      <span class="em">${o[1]}</span><span>${o[0]}</span>${cfg.multi?'<span class="chk"></span>':''}</div>`;
  }).join("");
  el.innerHTML=`${head}
    <h1>${cfg.q}</h1>
    ${cfg.intro?`<p class="sub">${cfg.intro}</p>`:''}
    <div class="qwrap">${optsHtml}</div>
    <div style="height:10px"></div>
    ${cfg.multi?`<button class="btn" id="nx">${s("next")} →</button>`:''}`;
  if(el.querySelector("#bk")) el.querySelector("#bk").onclick=()=>{stepI--;renderQ();};
  el.querySelectorAll(".opt").forEach(o=>o.onclick=()=>{
    const v=o.dataset.v;
    if(cfg.multi){
      const i=answers.needs.indexOf(v);
      if(i>=0)answers.needs.splice(i,1); else answers.needs.push(v);
      save("sahaay_answers",answers); renderQ();
    } else {
      answers[cfg.key]=v; save("sahaay_answers",answers);
      stepI++; renderQ();
    }
  });
  if(el.querySelector("#nx")) el.querySelector("#nx").onclick=()=>go("results");
}

function renderFeedback(el, head){
  const r=answers.fb.read, a=answers.fb.audio;
  el.innerHTML=`${head}
    <h1>${s("fbTitle")}</h1>
    <p class="sub">${s("fbIntro")}</p>
    <div class="fbcard">
      <div class="fbq"><span class="qn">1.</span><span>${s("fbQ1")}</span></div>
      <button class="spk" data-spk="${esc(s("fbQ1"))}">🔊 ${s("listen")}</button>
      <div class="ynrow">
        <button class="yn ${r===true?'sel':''}" data-fb="read" data-val="1">👍 ${s("yes")}</button>
        <button class="yn ${r===false?'sel':''}" data-fb="read" data-val="0">👎 ${s("no")}</button>
      </div>
    </div>
    <div class="fbcard">
      <div class="fbq"><span class="qn">2.</span><span>${s("fbQ2")}</span></div>
      <button class="spk" data-spk="${esc(s("fbQ2"))}">🔊 ${s("listen")}</button>
      <div class="ynrow">
        <button class="yn ${a===true?'sel':''}" data-fb="audio" data-val="1">👍 ${s("yes")}</button>
        <button class="yn ${a===false?'sel':''}" data-fb="audio" data-val="0">👎 ${s("no")}</button>
      </div>
    </div>
    <button class="btn" id="fbnext">${s("fbContinue")} →</button>`;
  el.querySelector("#bk").onclick=()=>{stepI--;renderQ();};
  el.querySelectorAll(".spk").forEach(b=>b.onclick=()=>speak(b.dataset.spk,b));
  el.querySelectorAll(".yn").forEach(b=>b.onclick=()=>{
    answers.fb[b.dataset.fb]=(b.dataset.val==="1");
    save("sahaay_answers",answers); renderFeedback(el,head);
  });
  el.querySelector("#fbnext").onclick=()=>{stepI++;renderQ();};
}

function renderResults(){
  const el=document.getElementById("screen-results");
  if(!answers.age){ // not answered yet
    el.innerHTML=`<h1>${s("resTitle")}</h1><p class="sub">${s("qIntro")}</p>
      <button class="btn" id="goq">${s("start")} →</button>`;
    el.querySelector("#goq").onclick=()=>go("q"); return;
  }
  // Record an anonymous usage row once per completed run
  if(!usageSent){ usageSent=true; postData('usage'); }
  const list=BENEFITS.filter(eligible);
  let cards = list.map(b=>{
    const open=openCards[b.id];
    const inList=checklist[b.id]!==undefined;
    const steps=b.steps.map((st,i)=>`<div class="step"><span class="n">${i+1}</span><span>${st[lang]}</span></div>`).join("");
    const docs=b.docs.map(d=>`<li>${d[lang]}</li>`).join("");
    const readAll=esc(b.title[lang]+". "+b.desc[lang]);
    return `<div class="card ${open?'open':''}" data-id="${b.id}">
      <div class="ch" data-toggle="${b.id}">
        <div class="ic">${b.icon}</div>
        <div class="ti"><h2>${b.title[lang]}</h2><span class="tag ${b.money?'money':''}">${b.tag[lang]}</span>
          <p>${b.desc[lang]}</p>
          <button class="spk mini" data-spk="${readAll}">🔊 ${s("listen")}</button></div>
        <div class="arrow">›</div>
      </div>
      <div class="body">
        <h3>${s("stepsT")}</h3>${steps}
        <h3>${s("docsT")}</h3><ul class="doclist">${docs}</ul>
        <h3>${s("whoT")}</h3><p style="font-size:14.5px;margin:0 0 4px">${b.who[lang]}</p>
        <div class="tip">💡 ${b.tip[lang]}</div>
        <div style="height:12px"></div>
        <button class="btn ${inList?'secondary':''}" data-add="${b.id}">${inList?s("added"):s("addList")}</button>
      </div>
    </div>`;
  }).join("");
  el.innerHTML=`
    <h1>${s("resTitle")}</h1>
    <div class="resulthead">${s("resSub")}</div>
    ${list.length?cards:`<div class="card"><div class="ch"><div class="ic">ℹ️</div><div class="ti"><p>${s("none")}</p></div></div></div>`}
    <div class="cardlite" id="contactCard">
      <h2>${s("contactTitle")}</h2>
      <p class="sub" style="margin:0 0 13px">${s("contactSub")}</p>
      <div id="cform">
        <input class="inp" id="cname" type="text" placeholder="${esc(s("nameLabel"))}">
        <input class="inp" id="cphone" type="tel" inputmode="tel" placeholder="${esc(s("phoneLabel"))}">
        <label class="consent"><input type="checkbox" id="cconsent"><span>${s("consentLabel")}</span></label>
        <button class="btn" id="csend">${s("contactSubmit")}</button>
        <div id="cerr" style="color:var(--warn);font-size:13.5px;margin-top:9px;display:none"></div>
      </div>
    </div>
    <div class="disclaimer">${s("glossDCPU")}</div>
    <div style="height:8px"></div>
    <button class="btn ghost" id="restart">↺ ${s("restart")}</button>`;
  el.querySelectorAll("[data-toggle]").forEach(c=>c.onclick=()=>{const id=c.dataset.toggle;openCards[id]=!openCards[id];renderResults();});
  el.querySelectorAll(".spk").forEach(b=>b.onclick=(e)=>{e.stopPropagation();speak(b.dataset.spk,b);});
  el.querySelectorAll("[data-add]").forEach(btn=>btn.onclick=(e)=>{e.stopPropagation();
    const id=btn.dataset.add;
    if(checklist[id]===undefined){checklist[id]=false;} // add unchecked
    save("sahaay_checklist",checklist); renderResults();});
  const send=el.querySelector("#csend");
  if(send) send.onclick=()=>{
    const name=el.querySelector("#cname").value.trim();
    const phone=el.querySelector("#cphone").value.trim();
    const consent=el.querySelector("#cconsent").checked;
    const err=el.querySelector("#cerr");
    if(!consent){err.textContent=s("needConsent");err.style.display="block";return;}
    if(!phone){err.textContent=s("needPhone");err.style.display="block";return;}
    postData('contact',{name:name, whatsapp:phone, consent:true});
    el.querySelector("#cform").innerHTML=`<div class="cmsg">${s("contactThanks")}</div>`;
  };
  el.querySelector("#restart").onclick=()=>{
    answers={age:null,where:null,needs:[],fb:{read:null,audio:null}};
    save("sahaay_answers",answers);openCards={};usageSent=false;go("q");};
}

function renderChecklist(){
  const el=document.getElementById("screen-checklist");
  const ids=Object.keys(checklist);
  if(!ids.length){
    el.innerHTML=`<h1>${s("ckTitle")}</h1><p class="sub">${s("ckSub")}</p>
      <div class="card"><div class="ch"><div class="ic">📝</div><div class="ti"><p>${s("ckEmpty")}</p></div></div></div>`;
    return;
  }
  const done=ids.filter(i=>checklist[i]).length;
  let items=ids.map(id=>{
    const b=BENEFITS.find(x=>x.id===id); if(!b)return"";
    const d=checklist[id];
    return `<div class="ckitem ${d?'done':''}" data-ck="${id}">
      <div class="box"></div>
      <div class="lbl"><b>${b.icon} ${b.title[lang]}</b><span>${b.who[lang]}</span></div></div>`;
  }).join("");
  el.innerHTML=`<h1>${s("ckTitle")}</h1><p class="sub">${s("ckSub")}</p>
    <p class="ckprog">${done} / ${ids.length} ${s("ckDone")}</p>${items}`;
  el.querySelectorAll("[data-ck]").forEach(it=>it.onclick=()=>{const id=it.dataset.ck;checklist[id]=!checklist[id];save("sahaay_checklist",checklist);renderChecklist();});
}

/* ============================ INIT ============================ */
document.querySelectorAll("#langSwitch button").forEach(b=>b.onclick=()=>setLang(b.dataset.l));
document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>go(b.dataset.go==="home"?"home":b.dataset.go));
document.querySelectorAll("#langSwitch button").forEach(b=>b.classList.toggle("on",b.dataset.l===lang));
document.documentElement.lang=lang;
render();
</script>
